plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.secureshare'
version = '1.0.0'

expoModule {
  canBePublished false
}

android {
  namespace "com.secureshare.watermark"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
    buildConfigField("String", "WATERMARK_SECRET", "\"${System.getenv('WATERMARK_SECRET') ?: 'DEV_FALLBACK_KEY'}\"")
  }
  buildFeatures {
    buildConfig true
  }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${kotlinVersion}"
}
